<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎨 Triển lãm tái chế</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
        overflow: hidden;
      }

      /* ===== HEADER ===== */
      header {
        background: linear-gradient(135deg, #2e7d32, #66bb6a);
        color: white;
        text-align: center;
        padding: 20px 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      header h1 {
        font-size: 1.8rem;
      }

      /* ===== CONTAINER ===== */
      .container {
        max-width: 1200px;
        margin: auto;
        padding: 15px 20px;
      }

      .scroll-wrapper {
        overflow: hidden;
        cursor: grab;
      }

      .scroll-wrapper:active {
        cursor: grabbing;
      }

      .gallery {
        display: grid;
        grid-template-rows: repeat(2, 220px);
        grid-auto-flow: column;
        gap: 20px;
        width: max-content;
      }

      .card {
        width: 250px;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.07);
        box-shadow:
          0 0 20px rgba(76, 175, 80, 0.7),
          0 0 40px rgba(76, 175, 80, 0.4);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        color: white;
        padding: 12px;
        opacity: 0;
        transition: 0.3s;
        font-weight: 600;
      }

      .card:hover .overlay {
        opacity: 1;
      }

      /* ===== POPUP ===== */
      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .popup img {
        max-width: 80%;
        max-height: 80%;
        border-radius: 15px;
      }

      .popup.active {
        display: flex;
      }

      /* ===== FOOTER ===== */
      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #2e7d32;
        color: white;
        text-align: center;
        padding: 10px;
        font-size: 0.9rem;
        box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.2);
      }

      /* ===== BACK BUTTON ===== */
      .back-btn {
        position: fixed;
        bottom: 70px;
        left: 20px;
        background: #2e7d32;
        color: white;
        padding: 12px 18px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        transition: 0.3s;
      }

      .back-btn:hover {
        background: #1b5e20;
        transform: translateY(-3px);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>♻️ Triển lãm sản phẩm tái chế</h1>
      <p>Biến rác thành tài nguyên – Sáng tạo vì môi trường 🌍</p>
    </header>

    <div class="container">
      <div class="scroll-wrapper" id="wrapper">
        <div class="gallery" id="gallery"></div>
      </div>
    </div>

    <footer>© 2026 Green School | Thiết kế bởi bạn 😎</footer>

    <!-- 🔙 Nút quay về -->
    <a href="index.html" class="back-btn">⬅️ Quay về</a>

    <div class="popup" id="popup">
      <img id="popupImg" />
    </div>

    <script>
      const data = [
        { src: "PICTURE/anh1.jpg", text: "Chậu cây từ chai nhựa" },
        { src: "PICTURE/anh2.jpg", text: "Túi xách từ túi nilon" },
        { src: "PICTURE/anh3.jpg", text: "Hộp bút tái chế" },
        { src: "PICTURE/anh4.jpg", text: "Trang trí từ rác" },
        { src: "PICTURE/anh5.jpg", text: "Đồ handmade" },
        { src: "PICTURE/anh6.jpg", text: "Vườn xanh mini" },
        { src: "PICTURE/anh7.jpg", text: "Chậu treo" },
        { src: "PICTURE/anh8.jpg", text: "DIY sáng tạo" },
      ];

      const gallery = document.getElementById("gallery");
      const wrapper = document.getElementById("wrapper");
      const popup = document.getElementById("popup");
      const popupImg = document.getElementById("popupImg");

      data.concat(data).forEach((item) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        <img src="${item.src}" />
        <div class="overlay">${item.text}</div>
      `;

        card.onclick = () => {
          popup.classList.add("active");
          popupImg.src = item.src;
        };

        gallery.appendChild(card);
      });

      popup.onclick = () => popup.classList.remove("active");

      let scrollSpeed = 0.5;
      function autoScroll() {
        wrapper.scrollLeft += scrollSpeed;
        if (wrapper.scrollLeft >= gallery.scrollWidth / 2) {
          wrapper.scrollLeft = 0;
        }
        requestAnimationFrame(autoScroll);
      }
      autoScroll();

      let isDown = false;
      let startX;
      let scrollLeft;

      wrapper.addEventListener("mousedown", (e) => {
        isDown = true;
        startX = e.pageX - wrapper.offsetLeft;
        scrollLeft = wrapper.scrollLeft;
      });

      wrapper.addEventListener("mouseleave", () => (isDown = false));
      wrapper.addEventListener("mouseup", () => (isDown = false));

      wrapper.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - wrapper.offsetLeft;
        const walk = (x - startX) * 2;
        wrapper.scrollLeft = scrollLeft - walk;
      });
    </script>
  </body>
</html>
